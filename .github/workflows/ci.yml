name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    name: Build and Test (${{ matrix.build }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [maven, gradle]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: ${{ matrix.build }}

      - name: Set up Gradle
        if: matrix.build == 'gradle'
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test (Maven)
        if: matrix.build == 'maven' && hashFiles('pom.xml') != ''
        run: |
          mvn -B -ntp -DskipITs=true verify

      - name: Build & Test (Gradle)
        if: matrix.build == 'gradle' && hashFiles('**/build.gradle*') != ''
        run: |
          ./gradlew --no-daemon clean test jacocoTestReport build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.build }}
          path: |
            **/target/surefire-reports/**
            **/build/test-results/test/**
            **/build/reports/tests/test/**
          if-no-files-found: ignore

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.build }}
          path: |
            **/target/site/jacoco/jacoco.xml
            **/build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: ignore

  sonar:
    name: Unit Test Sonar Analysis
    needs: build-test
    runs-on: ubuntu-latest
    if: |
      (vars.SONAR_ENABLED == 'true' || secrets.SONAR_TOKEN != '')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-maven
          path: coverage/maven
        continue-on-error: true

      - name: Download coverage artifacts (Gradle)
        uses: actions/download-artifact@v4
        with:
          name: coverage-gradle
          path: coverage/gradle
        continue-on-error: true

      - name: SonarCloud Scan
        if: vars.SONAR_CLOUD == 'true' || (vars.SONAR_HOST_URL == '' && vars.SONAR_ORGANIZATION != '')
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # The action auto-detects most settings. Provide project/organization via sonar-project.properties or env.
          projectBaseDir: .

      - name: SonarQube Scan
        if: vars.SONAR_CLOUD != 'true' && vars.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  package:
    name: Package Artifact
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Package (Maven)
        if: hashFiles('pom.xml') != ''
        run: mvn -B -ntp -DskipTests=true package

      - name: Package (Gradle)
        if: hashFiles('**/build.gradle*') != ''
        run: ./gradlew --no-daemon -x test build

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/target/*.jar
            **/target/*.war
            **/build/libs/*.jar
          if-no-files-found: warn

  docker:
    name: Build and Push Docker Image
    needs: package
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ vars.REGISTRY_IMAGE_NAME != '' && vars.REGISTRY_IMAGE_NAME || format('ghcr.io/{0}', github.repository) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: vars
        run: |
          echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "ref=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          provenance: false
        continue-on-error: true

      - name: Fallback build without push (no Dockerfile or permissions)
        if: failure()
        run: |
          echo "Docker build failed or Dockerfile missing. Skipping push."
          exit 0
